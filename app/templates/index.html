<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO App</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        input[type="text"] { width: 70%; padding: 8px; font-size: 16px; }
        button { padding: 8px 16px; font-size: 16px; cursor: pointer; }
        .todo-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #eee; }
        .todo-item.done span { text-decoration: line-through; color: #999; }
        .delete-btn { margin-left: auto; background: none; border: none; color: red; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>My TODO App</h1>

    <div>
        <input type="text" id="new-todo" placeholder="What needs to be done?" />
        <button onclick="addTodo()">Add</button>
    </div>

    <div id="todo-list" style="margin-top: 20px;"></div>

    <script>
        // Load all todos when the page opens
        window.onload = loadTodos;

        async function loadTodos() {
            const res = await fetch('/api/todos');
            const todos = await res.json();

            const list = document.getElementById('todo-list');

            list.innerHTML = todos.map(todo => `
                <div class="todo-item ${todo.completed ? 'done' : ''}" id="todo-${todo.id}">
                    <input type="checkbox"
                        ${todo.completed ? 'checked' : ''}
                        onchange="toggleTodo(${todo.id}, this.checked)" />

                    <span>${todo.title}</span>

                    <button class="delete-btn"
                        onclick="deleteTodo(${todo.id})">
                        ✕
                    </button>
                </div>
            `).join('');
        }

        async function addTodo() {
            const input = document.getElementById('new-todo');
            const title = input.value.trim();

            if (!title) return;

            await fetch('/api/todos', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ title })
            });

            input.value = '';
            loadTodos();
        }

        async function toggleTodo(id, completed) {
            await fetch(`/api/todos/${id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ completed })
            });

            loadTodos();
        }

        async function deleteTodo(id) {
            await fetch(`/api/todos/${id}`, {
                method: 'DELETE'
            });

            loadTodos();
        }
    </script>
</body>
</html>
